{% assign redirect_target = page.redirect_to | default: site.resume_pdf %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}Redirecting…{% endif %}</title>
  <meta http-equiv="refresh" content="0;url={{ redirect_target | relative_url }}">
  <link rel="canonical" href="{{ redirect_target | absolute_url }}">
</head>
<body>
  <p><a href="{{ redirect_target | relative_url }}">Continue to resume (PDF)</a></p>
</body>
</html>
