---
layout: default
---

<main class="main" id="main">
  <div class="wrap">
    <section class="hero">
      <h1>{{ site.title }}</h1>
      <p class="tagline">{{ site.description }}</p>
      <div class="hero-actions">
        <a href="{{ '/about' | relative_url }}" class="btn btn-primary">About me</a>
        <a href="{{ '/resume' | relative_url }}" class="btn btn-secondary">Resume</a>
      </div>
    </section>
    {% assign trimmed = content | strip %}{% if trimmed != '' %}
    <div class="page-content">
      {{ content }}
    </div>
    {% endif %}
  </div>
</main>
